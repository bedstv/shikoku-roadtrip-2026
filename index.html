<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#173c3b" />
  <meta name="description" content="2026 四國六天五夜自駕行程，提供每日行程、住宿、停車提醒與 Google Maps 即時導航。" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>2026 四國自駕行｜行程導航</title>
  <style>
    :root {
      --ink: #152322;
      --muted: #5d6967;
      --paper: #f5f5f0;
      --surface: #ffffff;
      --line: #d9dfda;
      --forest: #173c3b;
      --green: #237a63;
      --sea: #167d9a;
      --sun: #e1a622;
      --coral: #d95d45;
      --blue-soft: #e6f2f5;
      --green-soft: #e7f2ed;
      --amber-soft: #fff3d3;
      --coral-soft: #fbe9e4;
      --shadow: 0 5px 18px rgba(20, 41, 38, .08);
      --radius: 8px;
      --safe-bottom: max(16px, env(safe-area-inset-bottom));
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 132px; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.55;
    }
    button, a { -webkit-tap-highlight-color: transparent; }
    button { font: inherit; }
    .icon { width: 18px; height: 18px; flex: 0 0 18px; }
    .shell { width: min(100%, 980px); margin: 0 auto; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      color: #fff;
      background: var(--forest);
      border-bottom: 1px solid rgba(255,255,255,.14);
    }
    .header-main { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px 8px; }
    .brand { min-width: 0; }
    .brand h1 { margin: 0; font-size: 19px; line-height: 1.25; letter-spacing: 0; }
    .brand p { margin: 2px 0 0; font-size: 12px; color: rgba(255,255,255,.76); }
    .version-info { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; padding: 2px 7px; color: #d7f3ec; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); border-radius: 999px; font-size: 11px; font-weight: 800; }
    .header-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      color: #fff;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: var(--radius);
      text-decoration: none;
    }
    .day-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 0 14px 10px; scrollbar-width: none; }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex: 0 0 auto;
      min-width: 56px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      color: rgba(255,255,255,.78);
      background: transparent;
      font-size: 12px;
      font-weight: 750;
      text-decoration: none;
      text-align: center;
    }
    .day-tab.active { color: var(--forest); background: #fff; border-color: #fff; }

    .hero { position: relative; min-height: 220px; overflow: hidden; background: #244b4a; }
    .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 48%; }
    .hero::after { content: ""; position: absolute; inset: 0; background: rgba(8, 25, 25, .54); }
    .hero-content { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: flex-end; min-height: 220px; padding: 26px 16px 20px; color: #fff; }
    .eyebrow { margin: 0 0 5px; font-size: 12px; font-weight: 800; color: #d7f3ec; }
    .hero h2 { max-width: 620px; margin: 0; font-size: clamp(27px, 6vw, 42px); line-height: 1.14; letter-spacing: 0; }
    .hero p { max-width: 650px; margin: 8px 0 0; color: rgba(255,255,255,.86); font-size: 14px; }

    main { padding: 0 12px calc(80px + var(--safe-bottom)); }
    .status-band { margin: -1px -12px 0; padding: 14px 12px; background: var(--surface); border-bottom: 1px solid var(--line); }
    .status-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; }
    .status-kicker { font-size: 12px; color: var(--muted); }
    .status-value { margin-top: 2px; font-size: 17px; font-weight: 850; }
    .countdown { min-width: 72px; padding: 9px 10px; color: var(--forest); background: var(--green-soft); border-radius: var(--radius); text-align: center; font-size: 12px; font-weight: 800; }

    .quick-actions { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; margin: 14px 0 4px; }
    .quick-action {
      display: flex;
      min-width: 0;
      min-height: 68px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 4px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 11px;
      font-weight: 750;
      box-shadow: 0 2px 8px rgba(20,41,38,.04);
    }
    .quick-action .icon { color: var(--green); }

    .section { padding: 24px 0 6px; }
    .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .section-head h2 { margin: 0; font-size: 22px; letter-spacing: 0; }
    .section-head p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .section-label { flex: 0 0 auto; color: var(--green); font-size: 12px; font-weight: 850; }

    .info-list, .timeline { display: grid; gap: 9px; }
    .info-row, .stop {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .info-row { display: grid; grid-template-columns: 42px 1fr auto; align-items: center; gap: 10px; padding: 12px; }
    .info-icon { display: grid; place-items: center; width: 42px; height: 42px; color: var(--forest); background: var(--green-soft); border-radius: 7px; }
    .info-title { margin: 0; font-size: 15px; font-weight: 850; }
    .info-meta { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .text-link { color: var(--sea); font-size: 12px; font-weight: 800; text-decoration: none; }

    .day-section { padding: 28px 0 4px; }
    .day-title { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; margin-bottom: 12px; }
    .day-number { display: grid; place-items: center; width: 44px; height: 44px; color: #fff; background: var(--forest); border-radius: 7px; font-size: 13px; font-weight: 900; }
    .day-title h2 { margin: 0; font-size: 21px; line-height: 1.25; }
    .day-title p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .day-route { margin-bottom: 12px; padding: 11px 12px; color: #234640; background: var(--green-soft); border-left: 4px solid var(--green); border-radius: 0 7px 7px 0; font-size: 13px; font-weight: 700; }

    .stop { position: relative; display: grid; grid-template-columns: 54px 1fr; gap: 9px 12px; padding: 13px; overflow: hidden; }
    .stop::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--sea); }
    .stop.shopping::before { background: var(--sun); }
    .stop.hotel::before { background: var(--green); }
    .stop.alert::before { background: var(--coral); }
    .stop-time { padding-top: 2px; color: var(--muted); font-size: 12px; font-weight: 850; }
    .stop-main { min-width: 0; }
    .stop h3 { margin: 0; font-size: 16px; line-height: 1.35; letter-spacing: 0; }
    .stop p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .tag { padding: 3px 7px; color: #38504c; background: #edf1ef; border-radius: 5px; font-size: 11px; font-weight: 800; }
    .tag.parking { color: #185b70; background: var(--blue-soft); }
    .tag.warning { color: #8b3d2b; background: var(--coral-soft); }
    .tag.shop { color: #795610; background: var(--amber-soft); }
    .stop-actions { grid-column: 2; display: flex; flex-wrap: wrap; gap: 7px; }
    .btn {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 12px;
      color: #fff;
      background: var(--forest);
      border: 0;
      border-radius: 7px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }
    .btn.secondary { color: var(--forest); background: #edf2ef; border: 1px solid #cfd9d3; }
    .btn.shop-btn { color: #513b09; background: var(--amber-soft); border: 1px solid #ead395; }
    .btn.full { width: 100%; }

    .drive-grid { display: grid; gap: 9px; }
    .drive-note { padding: 13px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); }
    .drive-note h3 { display: flex; align-items: center; gap: 8px; margin: 0 0 5px; font-size: 15px; }
    .drive-note p { margin: 0; color: var(--muted); font-size: 13px; }
    details { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); margin-top: 9px; }
    summary { display: flex; align-items: center; gap: 8px; padding: 13px; font-weight: 850; cursor: pointer; }
    details p, details ul { margin: 0; padding: 0 14px 14px; color: var(--muted); font-size: 13px; }
    details ul { padding-left: 32px; }

    .footer { margin: 28px -12px 0; padding: 20px 14px calc(16px + var(--safe-bottom)); color: #c8d6d2; background: #102d2c; font-size: 11px; text-align: center; }
    .footer a { color: #d9efe9; }
    .toast { position: fixed; left: 50%; bottom: calc(18px + var(--safe-bottom)); z-index: 80; padding: 10px 14px; color: #fff; background: #142322; border-radius: 7px; box-shadow: var(--shadow); transform: translate(-50%, 16px); opacity: 0; pointer-events: none; transition: .2s ease; font-size: 13px; font-weight: 800; }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }

    @media (min-width: 720px) {
      .header-main, .day-tabs { padding-left: 20px; padding-right: 20px; }
      main { padding-left: 20px; padding-right: 20px; }
      .status-band, .footer { margin-left: -20px; margin-right: -20px; padding-left: 20px; padding-right: 20px; }
      .quick-actions { grid-template-columns: repeat(4, 150px); justify-content: start; }
      .info-list { grid-template-columns: 1fr 1fr; }
      .drive-grid { grid-template-columns: repeat(3, 1fr); }
      .stop { grid-template-columns: 66px 1fr auto; align-items: center; }
      .stop-actions { grid-column: 3; grid-row: 1; align-self: center; justify-content: flex-end; max-width: 270px; }
      .stop-actions .btn { min-width: 118px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="shell">
      <div class="header-main">
        <div class="brand">
          <h1 id="brandTitle">2026 四國自駕行</h1>
          <p id="brandSubtitle">7/18–7/23｜高松・鳴門・直島・松山</p>
          <p class="version-info" id="versionInfo">更新：2026-06-22 22:52｜資料分離版 v4</p>
        </div>
        <a class="header-action" href="#drive" title="自駕提醒" aria-label="查看自駕提醒"><i data-lucide="car-front" class="icon"></i></a>
      </div>
      <nav class="day-tabs" id="dayTabs" aria-label="每日行程">
        <a class="day-tab active" href="#overview">總覽</a>
      </nav>
    </div>
  </header>

  <section class="hero" aria-labelledby="hero-title">
    <img id="heroImage" src="./assets/naruto-strait.jpg" alt="從渦之道眺望鳴門海峽與大鳴門橋" />
    <div class="hero-content shell">
      <p class="eyebrow" id="eyebrow">6 DAYS · 5 NIGHTS · SELF DRIVE</p>
      <h2 id="hero-title">瀨戶內海到道後溫泉的夏日公路旅行</h2>
      <p id="heroText">以住宿與實際車程為核心，提供每日停靠順序、停車提醒及 Google Maps 一鍵自駕導航。</p>
    </div>
  </section>

  <main class="shell" id="overview">
    <section class="status-band" aria-label="旅程狀態">
      <div class="status-row">
        <div>
          <div class="status-kicker" id="statusKicker">距離出發</div>
          <div class="status-value" id="statusValue">計算中</div>
        </div>
        <div class="countdown" id="countdown">2026/07/18</div>
      </div>
    </section>

    <div class="quick-actions" id="quickActions" aria-label="快速導航"></div>

    <section class="section" aria-labelledby="essentials-title">
      <div class="section-head">
        <div><h2 id="essentials-title">旅行核心資訊</h2><p>航班與住宿已確認</p></div>
        <span class="section-label" id="bookingCode">FRNJVB</span>
      </div>
      <div class="info-list" id="essentialsList"></div>
    </section>

    <div id="daySections"></div>

    <section class="section" id="drive" aria-labelledby="drive-title">
      <div class="section-head"><div><h2 id="drive-title">自駕備忘</h2><p>出發前與每天上車前快速確認</p></div><span class="section-label">DRIVE</span></div>
      <div class="drive-grid" id="driveGrid"></div>
      <div id="driveDetails"></div>
    </section>

    <footer class="footer" id="footer"></footer>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">已開啟 Google Maps</div>
  <script src="./assets/lucide.min.js"></script>
  <script src="./data.js?v=202606222252"></script>
  <script>
    const DATA = window.TRIP_DATA || {};

    function escapeHtml(value = '') {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function mapsUrl(destination) {
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}&travelmode=driving`;
    }

    function icon(name) {
      return `<i data-lucide="${escapeHtml(name)}" class="icon"></i>`;
    }

    function attrsForAction(action = {}) {
      if (action.url) {
        return `href="${escapeHtml(action.url)}" target="_blank" rel="noopener"`;
      }
      if (action.nav) {
        return `href="${mapsUrl(action.nav)}" target="_blank" rel="noopener" data-nav="${escapeHtml(action.nav)}"`;
      }
      return 'href="#"';
    }

    function actionClass(kind) {
      if (kind === 'secondary') return 'btn secondary';
      if (kind === 'shop') return 'btn shop-btn';
      return 'btn';
    }

    function renderMeta() {
      const meta = DATA.meta || {};
      document.title = `${meta.title || '2026 四國自駕行'}｜行程導航`;
      document.getElementById('brandTitle').textContent = meta.title || '';
      document.getElementById('brandSubtitle').textContent = meta.subtitle || '';
      const versionText = [meta.updatedAt, meta.version].filter(Boolean).join('｜');
      document.getElementById('versionInfo').textContent = versionText ? `更新：${versionText}` : '';
      document.getElementById('heroImage').src = meta.heroImage || './assets/naruto-strait.jpg';
      document.getElementById('heroImage').alt = meta.heroAlt || '';
      document.getElementById('eyebrow').textContent = meta.eyebrow || '';
      document.getElementById('hero-title').textContent = meta.heroTitle || '';
      document.getElementById('heroText').textContent = meta.heroText || '';
      document.getElementById('countdown').textContent = meta.statusDateText || '';
      document.getElementById('bookingCode').textContent = meta.bookingCode || '';
    }

    function renderTabs() {
      const tabs = document.getElementById('dayTabs');
      tabs.innerHTML = `<a class="day-tab active" href="#overview">總覽</a>` + (DATA.days || []).map(day => (
        `<a class="day-tab" href="#${escapeHtml(day.id)}">${escapeHtml(day.tab)}</a>`
      )).join('');
    }

    function renderQuickActions() {
      document.getElementById('quickActions').innerHTML = (DATA.quickActions || []).map(action => {
        const attr = action.url
          ? `href="${escapeHtml(action.url)}" target="_blank" rel="noopener"`
          : `href="${mapsUrl(action.nav)}" target="_blank" rel="noopener" data-nav="${escapeHtml(action.nav)}"`;
        return `<a class="quick-action" ${attr}>${icon(action.icon)}<span>${escapeHtml(action.label)}</span></a>`;
      }).join('');
    }

    function renderEssentials() {
      document.getElementById('essentialsList').innerHTML = (DATA.essentials || []).map(item => `
        <div class="info-row">
          <div class="info-icon">${icon(item.icon)}</div>
          <div><p class="info-title">${escapeHtml(item.title)}</p><p class="info-meta">${escapeHtml(item.meta)}</p></div>
          <a class="text-link" href="${mapsUrl(item.nav)}" target="_blank" rel="noopener" data-nav="${escapeHtml(item.nav)}">導航</a>
        </div>
      `).join('');
    }

    function renderTags(tags = []) {
      if (!tags.length) return '';
      return `<div class="tags">${tags.map(tag => `<span class="tag ${escapeHtml(tag.kind || '')}">${escapeHtml(tag.text)}</span>`).join('')}</div>`;
    }

    function renderActions(actions = []) {
      if (!actions.length) return '';
      return `<div class="stop-actions">${actions.map(action => `
        <a class="${actionClass(action.kind)}" ${attrsForAction(action)}>${icon(action.icon || 'map-pin')}${escapeHtml(action.label)}</a>
      `).join('')}</div>`;
    }

    function renderDays() {
      document.getElementById('daySections').innerHTML = (DATA.days || []).map(day => `
        <section class="day-section" id="${escapeHtml(day.id)}" data-section="${escapeHtml(day.id)}">
          <div class="day-title"><div class="day-number">${escapeHtml(day.number)}</div><div><h2>${escapeHtml(day.title)}</h2><p>${escapeHtml(day.subtitle)}</p></div></div>
          <div class="day-route">${escapeHtml(day.route)}</div>
          <div class="timeline">
            ${(day.stops || []).map(stop => `
              <article class="stop ${escapeHtml(stop.type || '')}">
                <time class="stop-time">${escapeHtml(stop.time)}</time>
                <div class="stop-main"><h3>${escapeHtml(stop.title)}</h3><p>${escapeHtml(stop.description)}</p>${renderTags(stop.tags)}</div>
                ${renderActions(stop.actions)}
              </article>
            `).join('')}
          </div>
        </section>
      `).join('');
    }

    function renderDrive() {
      const drive = DATA.drive || {};
      document.getElementById('driveGrid').innerHTML = (drive.notes || []).map(note => `
        <div class="drive-note"><h3>${icon(note.icon)}${escapeHtml(note.title)}</h3><p>${escapeHtml(note.description)}</p></div>
      `).join('');
      document.getElementById('driveDetails').innerHTML = (drive.details || []).map(detail => {
        const body = detail.items
          ? `<ul>${detail.items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
          : `<p>${escapeHtml(detail.text)}</p>`;
        return `<details><summary>${icon(detail.icon)}${escapeHtml(detail.title)}</summary>${body}</details>`;
      }).join('');
    }

    function renderFooter() {
      const meta = DATA.meta || {};
      const photo = meta.photoCreditUrl
        ? `<p>照片：<a href="${escapeHtml(meta.photoCreditUrl)}" target="_blank" rel="noopener">${escapeHtml(meta.photoCreditText || 'Wikimedia Commons')}</a></p>`
        : '';
      document.getElementById('footer').innerHTML = `
        <p>最後更新：${escapeHtml(meta.updatedAt)}｜${escapeHtml(meta.version)}｜${escapeHtml(meta.disclaimer)}</p>
        ${photo}
      `;
    }

    function installNavHandlers() {
      document.querySelectorAll('[data-nav]').forEach(link => {
        link.addEventListener('click', () => showToast(`導航：${link.dataset.nav}`));
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      window.setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function updateTripStatus() {
      const meta = DATA.meta || {};
      const tripStart = new Date(meta.tripStart || '2026-07-18T00:00:00+09:00');
      const tripEnd = new Date(meta.tripEnd || '2026-07-23T23:59:59+09:00');
      const now = new Date();
      const kicker = document.getElementById('statusKicker');
      const value = document.getElementById('statusValue');
      const countdown = document.getElementById('countdown');
      if (now < tripStart) {
        const days = Math.ceil((tripStart - now) / 86400000);
        kicker.textContent = '距離出發';
        value.textContent = `${days} 天後前往四國`;
        countdown.textContent = meta.departureText || '7/18 出發';
      } else if (now <= tripEnd) {
        const day = Math.min((DATA.days || []).length || 6, Math.floor((now - tripStart) / 86400000) + 1);
        kicker.textContent = '旅程進行中';
        value.textContent = `今天是 Day ${day}`;
        countdown.textContent = '自駕中';
      } else {
        kicker.textContent = '旅程已結束';
        value.textContent = '四國自駕行程紀錄';
        countdown.textContent = meta.durationText || '6 天 5 夜';
      }
    }

    function activateScrollSpy() {
      const trackedSections = [...document.querySelectorAll('[data-section]'), document.getElementById('overview')].filter(Boolean);
      const tabs = [...document.querySelectorAll('.day-tab')];
      const observer = new IntersectionObserver(entries => {
        const visible = entries.filter(entry => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        const id = visible.target.id;
        tabs.forEach(tab => tab.classList.toggle('active', tab.getAttribute('href') === `#${id}`));
      }, { rootMargin: '-125px 0px -62% 0px', threshold: [0, .15, .5] });
      trackedSections.forEach(section => observer.observe(section));
    }

    renderMeta();
    renderTabs();
    renderQuickActions();
    renderEssentials();
    renderDays();
    renderDrive();
    renderFooter();
    installNavHandlers();
    updateTripStatus();
    activateScrollSpy();
    if (window.lucide) window.lucide.createIcons();
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
