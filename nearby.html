<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#173c3b" />
  <meta name="description" content="依目前位置快速查看四國自駕行附近可去的景點、購物、美食與備案點。" />
  <title>2026 四國自駕行｜附近景點</title>
  <style>
    :root{--ink:#152322;--muted:#5d6967;--paper:#f5f5f0;--surface:#fff;--line:#d9dfda;--forest:#173c3b;--green:#237a63;--sea:#167d9a;--sun:#e1a622;--coral:#d95d45;--blue-soft:#e6f2f5;--green-soft:#e7f2ed;--amber-soft:#fff3d3;--coral-soft:#fbe9e4;--shadow:0 5px 18px rgba(20,41,38,.08);--radius:8px;--safe-bottom:max(16px,env(safe-area-inset-bottom))}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);background:var(--paper);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.55}button,input,a{-webkit-tap-highlight-color:transparent}button,input{font:inherit}.icon{width:18px;height:18px;flex:0 0 18px}.shell{width:min(100%,980px);margin:0 auto}.app-header{position:sticky;top:0;z-index:30;color:#fff;background:var(--forest);border-bottom:1px solid rgba(255,255,255,.14)}.header-main{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px}.brand{min-width:0}.brand h1{margin:0;font-size:19px;line-height:1.25}.brand p{margin:2px 0 0;color:rgba(255,255,255,.76);font-size:12px}.header-actions{display:flex;gap:7px}.header-action{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:var(--radius);text-decoration:none}
    main{padding:0 12px calc(82px + var(--safe-bottom))}.panel{margin:12px 0;padding:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.status{display:grid;gap:6px}.status h2{margin:0;font-size:22px}.status p{margin:0;color:var(--muted);font-size:13px}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;background:var(--green-soft);color:#234640;font-size:12px;font-weight:850}.pill.warn{background:var(--coral-soft);color:#8b3d2b}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn{display:inline-flex;min-height:42px;align-items:center;justify-content:center;gap:7px;padding:9px 12px;color:#fff;background:var(--forest);border:0;border-radius:7px;text-decoration:none;font-size:13px;font-weight:850;cursor:pointer}.btn.secondary{color:var(--forest);background:#edf2ef;border:1px solid #cfd9d3}.btn.shop{color:#513b09;background:var(--amber-soft);border:1px solid #ead395}.btn.full{width:100%}.filters{display:grid;gap:9px}.search{width:100%;min-height:42px;padding:9px 11px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:7px}.chip-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}.chip-row::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:12px;font-weight:850;cursor:pointer}.chip.active{color:#fff;background:var(--forest);border-color:var(--forest)}.summary{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 0 8px}.summary h2{margin:0;font-size:19px}.summary span{color:var(--muted);font-size:12px;font-weight:800}.grid{display:grid;gap:9px}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-main{display:grid;grid-template-columns:54px 1fr;gap:10px;padding:12px}.distance{display:grid;place-items:center;width:54px;height:54px;border-radius:8px;background:var(--green-soft);color:var(--forest);text-align:center;font-size:12px;font-weight:900;line-height:1.1}.distance.far{background:#edf1ef;color:#38504c}.distance.warn{background:var(--coral-soft);color:#8b3d2b}.card h3{margin:0;font-size:16px;line-height:1.35}.card p{margin:5px 0 0;color:var(--muted);font-size:13px}.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.tag{padding:3px 7px;border-radius:5px;background:#edf1ef;color:#38504c;font-size:11px;font-weight:850}.tag.main{background:var(--green-soft);color:#234640}.tag.backup{background:var(--amber-soft);color:#795610}.tag.optional{background:var(--coral-soft);color:#8b3d2b}.tag.category{background:var(--blue-soft);color:#185b70}.card-actions{display:flex;flex-wrap:wrap;gap:7px;padding:0 12px 12px 76px}.empty{padding:18px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:var(--radius)}.footer{margin:28px -12px 0;padding:18px 14px calc(16px + var(--safe-bottom));color:#c8d6d2;background:#102d2c;font-size:11px;text-align:center}.footer p{margin:4px 0}.toast{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));z-index:80;padding:10px 14px;color:#fff;background:#142322;border-radius:7px;box-shadow:var(--shadow);transform:translate(-50%,16px);opacity:0;pointer-events:none;transition:.2s ease;font-size:13px;font-weight:850}.toast.show{transform:translate(-50%,0);opacity:1}@media(min-width:720px){.header-main{padding-left:20px;padding-right:20px}main{padding-left:20px;padding-right:20px}.footer{margin-left:-20px;margin-right:-20px}.grid{grid-template-columns:repeat(2,1fr)}.panel.top{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:end}.actions{grid-template-columns:repeat(2,180px);justify-content:end}.card-actions{padding-left:76px}}
  </style>
</head>
<body>
  <header class="app-header">
    <div class="shell">
      <div class="header-main">
        <div class="brand"><h1>附近景點</h1><p>依目前位置找可順路去的點</p></div>
        <div class="header-actions">
          <a class="header-action" href="./index.html" title="行程首頁" aria-label="行程首頁"><i data-lucide="calendar-days" class="icon"></i></a>
          <a class="header-action" href="./shopping.html" title="吃買逛" aria-label="吃買逛"><i data-lucide="shopping-bag" class="icon"></i></a>
        </div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="panel top" aria-labelledby="pageTitle">
      <div class="status">
        <h2 id="pageTitle">現在附近有什麼可以去？</h2>
        <p id="statusText">按下定位後，會依你目前位置排序景點、購物、美食、伴手禮與備案點。定位只在你的瀏覽器內使用。</p>
        <div class="meta"><span class="pill" id="countPill">讀取景點資料中</span><span class="pill warn">導航以 Google Maps 為準</span></div>
      </div>
      <div class="actions">
        <button class="btn" id="locateBtn" type="button"><i data-lucide="locate-fixed" class="icon"></i>使用目前位置</button>
        <button class="btn secondary" id="resetBtn" type="button"><i data-lucide="list" class="icon"></i>顯示全部</button>
      </div>
    </section>

    <section class="panel filters" aria-label="篩選附近景點">
      <input class="search" id="searchInput" type="search" placeholder="搜尋：栗林、mont-bell、Snow Peak、道後、伴手禮..." />
      <div class="chip-row" id="dayFilters" aria-label="依日期篩選"></div>
      <div class="chip-row" id="categoryFilters" aria-label="依分類篩選"></div>
    </section>

    <div class="summary"><h2 id="listTitle">全部點位</h2><span id="resultCount">0 個點</span></div>
    <section class="grid" id="spotList" aria-live="polite"></section>
    <footer class="footer"><p id="metaText">2026 四國自駕行｜附近景點</p><p>座標用於距離排序；實際路線、營業時間與停車狀況請以 Google Maps 和現場為準。</p></footer>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./assets/lucide.min.js"></script>
  <script src="./spots.js?v=202607070910"></script>
  <script>
    const SPOTS = window.TRIP_SPOTS || [];
    const META = window.TRIP_SPOT_META || {};
    const state = { user: null, day: 'all', category: 'all', query: '' };
    const priorityRank = { fixed: 0, main: 1, backup: 2, optional: 3 };
    const categoryOrder = ['all','sightseeing','food','shopping','souvenir','outdoor','hotel','transport','backup'];

    function escapeHtml(value = '') {
      return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    }
    function icon(name) { return `<i data-lucide="${escapeHtml(name)}" class="icon"></i>`; }
    function mapsUrl(destination) { return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}&travelmode=driving`; }
    function searchUrl(query) { return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`; }
    function haversine(a, b) {
      const R = 6371;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(x));
    }
    function formatDistance(km) {
      if (km == null) return '未定位';
      if (km < 1) return `${Math.round(km * 1000)}m`;
      if (km < 10) return `${km.toFixed(1)}km`;
      return `${Math.round(km)}km`;
    }
    function distanceClass(km) {
      if (km == null) return 'far';
      if (km > 25) return 'warn';
      if (km > 8) return 'far';
      return '';
    }
    function priorityLabel(priority) {
      return { fixed:'固定', main:'主線', backup:'備案', optional:'遠程' }[priority] || '備案';
    }
    function buildFilters() {
      const days = ['all', ...Array.from(new Set(SPOTS.map(s => s.day).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-Hant'))];
      const categories = categoryOrder.filter(cat => cat === 'all' || SPOTS.some(s => s.category === cat));
      document.getElementById('dayFilters').innerHTML = days.map(day => `<button class="chip ${day === state.day ? 'active' : ''}" type="button" data-day="${escapeHtml(day)}">${day === 'all' ? '全部日期' : escapeHtml(day)}</button>`).join('');
      document.getElementById('categoryFilters').innerHTML = categories.map(cat => `<button class="chip ${cat === state.category ? 'active' : ''}" type="button" data-category="${escapeHtml(cat)}">${cat === 'all' ? '全部分類' : escapeHtml(categoryName(cat))}</button>`).join('');
    }
    function categoryName(category) {
      const hit = SPOTS.find(s => s.category === category);
      return hit ? hit.categoryLabel : category;
    }
    function getVisibleSpots() {
      const q = state.query.trim().toLowerCase();
      return SPOTS.map(spot => {
        const distance = state.user ? haversine(state.user, spot) : null;
        return { ...spot, distance };
      }).filter(spot => {
        const dayOk = state.day === 'all' || spot.day === state.day;
        const categoryOk = state.category === 'all' || spot.category === state.category;
        const text = [spot.name, spot.categoryLabel, spot.day, spot.date, spot.area, spot.note, ...(spot.tags || [])].join(' ').toLowerCase();
        const queryOk = !q || text.includes(q);
        return dayOk && categoryOk && queryOk;
      }).sort((a, b) => {
        if (state.user) return (a.distance ?? 9999) - (b.distance ?? 9999) || (priorityRank[a.priority] ?? 9) - (priorityRank[b.priority] ?? 9);
        return (priorityRank[a.priority] ?? 9) - (priorityRank[b.priority] ?? 9) || String(a.day).localeCompare(String(b.day), 'zh-Hant') || a.name.localeCompare(b.name, 'zh-Hant');
      });
    }
    function render() {
      buildFilters();
      const spots = getVisibleSpots();
      const title = state.user ? '依距離排序' : '全部點位';
      document.getElementById('listTitle').textContent = title;
      document.getElementById('resultCount').textContent = `${spots.length} 個點`;
      document.getElementById('countPill').textContent = `${SPOTS.length} 個行程點已載入`;
      document.getElementById('metaText').textContent = `2026 四國自駕行｜附近景點｜${META.updatedAt || ''}｜${META.version || ''}`;
      document.getElementById('spotList').innerHTML = spots.length ? spots.map(renderCard).join('') : '<div class="empty">沒有符合條件的點，試著取消分類或搜尋條件。</div>';
      if (window.lucide) window.lucide.createIcons();
    }
    function renderCard(spot) {
      const tags = [`<span class="tag category">${escapeHtml(spot.categoryLabel)}</span>`, `<span class="tag ${escapeHtml(spot.priority)}">${escapeHtml(priorityLabel(spot.priority))}</span>`, `<span class="tag">${escapeHtml(spot.day)}</span>`, ...(spot.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`)].join('');
      return `
        <article class="card">
          <div class="card-main">
            <div class="distance ${distanceClass(spot.distance)}">${escapeHtml(formatDistance(spot.distance))}</div>
            <div>
              <h3>${escapeHtml(spot.name)}</h3>
              <p>${escapeHtml(spot.note)}</p>
              <div class="tag-row">${tags}</div>
            </div>
          </div>
          <div class="card-actions">
            <a class="btn" href="${mapsUrl(spot.nav || spot.name)}" target="_blank" rel="noopener" data-nav="${escapeHtml(spot.name)}">${icon('navigation')}導航</a>
            <a class="btn secondary" href="${searchUrl(spot.nav || spot.name)}" target="_blank" rel="noopener">${icon('search')}查地圖</a>
          </div>
        </article>
      `;
    }
    function locate() {
      if (!navigator.geolocation) {
        showToast('這個瀏覽器不支援定位');
        return;
      }
      document.getElementById('statusText').textContent = '定位中，請允許瀏覽器取得目前位置。';
      navigator.geolocation.getCurrentPosition(pos => {
        state.user = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        document.getElementById('statusText').textContent = `已取得目前位置，精度約 ${Math.round(pos.coords.accuracy)} 公尺。`;
        showToast('已依目前位置排序');
        render();
      }, err => {
        state.user = null;
        document.getElementById('statusText').textContent = '無法取得定位。仍可用日期、分類和搜尋查看全部點位。';
        showToast(err.code === 1 ? '定位權限未允許' : '定位失敗');
        render();
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
    }
    function resetAll() {
      state.user = null;
      state.day = 'all';
      state.category = 'all';
      state.query = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('statusText').textContent = '已顯示全部點位。按下定位後可重新依距離排序。';
      render();
    }
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      window.setTimeout(() => toast.classList.remove('show'), 1600);
    }
    document.getElementById('locateBtn').addEventListener('click', locate);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('searchInput').addEventListener('input', event => { state.query = event.target.value; render(); });
    document.addEventListener('click', event => {
      const day = event.target.closest('[data-day]');
      const category = event.target.closest('[data-category]');
      const nav = event.target.closest('[data-nav]');
      if (day) { state.day = day.dataset.day; render(); }
      if (category) { state.category = category.dataset.category; render(); }
      if (nav) showToast(`導航：${nav.dataset.nav}`);
    });
    render();
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
